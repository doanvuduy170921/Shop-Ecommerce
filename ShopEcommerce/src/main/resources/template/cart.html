<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style-cart.css">
</head>
<body>
<div class="header-part" id="header-part"></div>
<div class="main">
    <div class="main-cart">
        <!--        <hr style="margin-top: -25px">-->
        <div class="header-cart">
            <div class="header-cart-container">
                <div class="logo-cart">
                    <div class="logo"><i style="color: orangered; margin-right: 10px; font-size: 40px"
                                         class="fa-solid fa-cart-shopping"></i></div>
                    <div class="cart" style="color: orangered ; width: 60px"><h5>Ecommerce</h5></div>
                </div>
                <div class="search-cart">
                    <div>
                        <input class="input-search-cart" type="text" placeholder="Tìm kiếm sản phẩm "/>
                    </div>
                    <div>
                        <button class="btn-search">
                            Search
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!--        <hr>-->
        <div class="main-list">
            <div class="list-cart-1 container">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="">
                    <div class="product-list-cart-1">Sản Phẩm</div>
                </div>
                <div class="title-list-cart-1">
                    <div>Đơn Giá</div>
                    <div>Số Lượng</div>
                    <div>Số Tiền</div>
                    <div>Thao Tác</div>
                </div>
            </div>
            <div class="list-cart-2 container">
                <div class="list-cart-2-1 container">
                    <div class=form-check-shop-name"">
                        <input class="form-check-input" type="checkbox" value="">
                    </div>
                    <div>
                        <a href="#" class="shop-name">
                            Tên Shop
                        </a>
                    </div>
                </div>
                <div class="list-cart-2-2 container">
                    <div class="list-cart-2-2-left">
                        <input class="form-check-input" type="checkbox" value="">
                        <div>
                            <img src=""> Hình ảnh
                        </div>
                        <div>
                            Mô tả
                        </div>
                        <div>
                            Phân loại
                        </div>
                    </div>
                    <div class="list-cart-2-2-right">
                        <div id="price">Giá trị Đơn giá</div>
                        <div id="quantity">Giá trị Số lượng</div>
                        <div id="total">Giá trị Số tiền</div>
                        <div id="action">Giá trị Thao tác</div>
                    </div>

                </div>
                <div class="list-cart-2-3 container">
                    <div><i class="fa-solid fa-ticket"></i></div>
                    <div><a href="#" class="vourcher-shop">Thêm Shop Voucher</a></div>
                </div>
                <div class="list-cart-2-4 container">
                    <div><i class="fa-solid fa-van-shuttle"></i></div>
                    <div>Giảm ₫300.000 phí vận chuyển đơn tối thiểu ₫0; Giảm ₫500.000 phí vận chuyển đơn tối thiểu
                        ₫500.000
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Bootstrap 5 JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script>
    fetch('component/header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-part').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));

    const productData = {
        price: "100.000đ",
        quantity: 2,
        total: "200.000đ",
        action: '<button class="btn btn-danger">Xóa</button>'
    };

    // Cập nhật nội dung các div
    document.getElementById("price").textContent = productData.price;
    document.getElementById("quantity").textContent = productData.quantity;
    document.getElementById("total").textContent = productData.total;
    document.getElementById("action").innerHTML = productData.action;
</script>
</body>
</html>
